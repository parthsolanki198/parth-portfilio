# Deploy Next.js to Cloudflare Workers (OpenNext).
# Add repository secret: CLOUDFLARE_API_TOKEN (Workers: Edit permission).
#
# Cloudflare Workers Builds: see cloudflare-build-steps.txt in repo root.

name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: OpenNext build (creates .open-next/)
        run: npm run cf:build
        env:
          NODE_ENV: production

      - name: Deploy to Cloudflare
        run: npm run cf:workers:deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
