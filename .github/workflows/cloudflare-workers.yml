# Deploy Next.js to Cloudflare Workers (OpenNext).
# Add repository secret: CLOUDFLARE_API_TOKEN (Workers: Edit permission).
# Optional: CLOUDFLARE_ACCOUNT_ID if wrangler prompts for it.

name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & deploy
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
