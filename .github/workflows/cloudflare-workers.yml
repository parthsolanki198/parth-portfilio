# Deploy Next.js to Cloudflare Workers (OpenNext).
# Add repository secret: CLOUDFLARE_API_TOKEN (Workers: Edit permission).
#
# Cloudflare Dashboard (Workers Builds) — if deploy fails with
# "Could not find compiled Open Next config", your BUILD step never ran OpenNext.
# Fix:
#   Build command:  npm ci && npm run cf:build
#   Deploy command: npm run cf:deploy
# Do NOT use only "npm run build" for build — that is plain next build and does not create .open-next/

name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: OpenNext build (creates .open-next/)
        run: npm run cf:build
        env:
          NODE_ENV: production

      - name: Deploy to Cloudflare
        run: npm run cf:deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
